# ================================
# Build System
# ================================

[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"


# ================================
# Project Metadata
# ================================

[project]
name = "baya"
dynamic = ["version"]
description = "Baya – Modular ML Orchestration Framework for structured machine learning workflows."
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }

authors = [
  { name = "Aditya Sarode" }
]

keywords = [
  "machine-learning",
  "data-science",
  "mlops",
  "orchestration",
  "pipeline",
  "framework",
  "ai"
]

classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
  "pandas>=1.5",
  "numpy>=1.22",
  "scikit-learn>=1.2",
  "matplotlib>=3.6",
  "pyyaml>=6.0",
]

# ================================
# Optional Dependencies
# ================================

[project.optional-dependencies]

viz = [
  "seaborn>=0.12",
  "plotly>=5.15"
]

deep = [
  "torch>=2.0",
  "tensorflow>=2.12"
]

stats = [
  "scipy>=1.10",
  "statsmodels>=0.14"
]

export = [
  "openpyxl>=3.1",
  "python-docx>=0.8",
  "reportlab>=4.0",
  "pillow>=10.0"
]

dev = [
  "pytest>=7.0",
  "pytest-cov>=4.0",
  "ruff>=0.1.0",
  "mypy>=1.5",
  "black>=23.0",
  "build>=1.0",
  "twine>=4.0"
]

# ================================
# URLs
# ================================

[project.urls]
Homepage = "https://github.com/yourusername/baya"
Documentation = "https://github.com/yourusername/baya/docs"
Repository = "https://github.com/yourusername/baya"
Issues = "https://github.com/yourusername/baya/issues"


# ================================
# CLI Entry
# ================================

[project.scripts]
baya = "baya.cli.main:main"


# ================================
# Version Source
# ================================

[tool.hatch.version]
path = "baya/version.py"


# ================================
# Build Targets
# ================================

[tool.hatch.build.targets.wheel]
packages = ["baya"]

include = [
  "baya/py.typed",
  "baya/assets/*.yaml"
]


# ================================
# Pytest
# ================================

[tool.pytest.ini_options]
addopts = "-ra -q"
testpaths = ["tests"]


# ================================
# Coverage
# ================================

[tool.coverage.run]
source = ["baya"]

[tool.coverage.report]
show_missing = true
skip_covered = true


# ================================
# Black
# ================================

[tool.black]
line-length = 88
target-version = ["py39"]


# ================================
# Ruff
# ================================

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = []


# ================================
# MyPy
# ================================

[tool.mypy]
python_version = "3.9"
strict = true
ignore_missing_imports = true
